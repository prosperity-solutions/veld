server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json text/markdown text/plain;
    gzip_min_length 256;

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Redirect /get to install script on GitHub
    location = /get {
        return 302 https://raw.githubusercontent.com/prosperity-solutions/veld/main/install.sh;
    }

    # Redirect /schema to JSON Schema on GitHub
    location /schema/ {
        rewrite ^/schema/(.*)$ https://raw.githubusercontent.com/prosperity-solutions/veld/main/schema/$1 redirect;
    }

    # LLM-readable content
    location = /llms.txt {
        types { text/markdown txt; }
        default_type text/markdown;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /llms-full.txt {
        types { text/markdown txt; }
        default_type text/markdown;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
