server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json text/markdown text/plain;
    gzip_min_length 256;

    # Cache static assets aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Homepage (experience view) — with Link headers for LLM discovery
    location = / {
        add_header Link '</llms.txt>; rel="describedby"; type="text/markdown"' always;
        add_header Link '</llms-full.txt>; rel="describedby"; type="text/markdown"' always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files /index.html =404;
    }

    # Agents page
    location = /agents {
        try_files /agents.html =404;
    }

    # Humans page
    location = /humans {
        try_files /humans.html =404;
    }

    # Redirect /get to install script on GitHub
    location = /get {
        return 302 https://raw.githubusercontent.com/prosperity-solutions/veld/main/install.sh;
    }

    # Redirect /schema to JSON Schema on GitHub
    location /schema/ {
        rewrite ^/schema/(.*)$ https://raw.githubusercontent.com/prosperity-solutions/veld/main/schema/$1 redirect;
    }

    # .well-known/llms.txt redirect
    location = /.well-known/llms.txt {
        return 301 /llms.txt;
    }

    # LLM-readable content
    location = /llms.txt {
        types { text/markdown txt; }
        default_type text/markdown;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location = /llms-full.txt {
        types { text/markdown txt; }
        default_type text/markdown;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Robots
    location = /robots.txt {
        default_type text/plain;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location = /health {
        default_type text/plain;
        return 200 'ok';
    }
}
