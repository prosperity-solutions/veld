name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  schema:
    name: Validate JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate schema and configs
        run: |
          chmod +x tests/validate-schema.sh
          ./tests/validate-schema.sh --install

  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo test
        run: cargo test --workspace

  release-build:
    name: Release Build (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    needs: check
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            suffix: macos-amd64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-arm64
            cross: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}
      - name: Verify binaries exist
        run: |
          for bin in veld veld-helper veld-daemon; do
            test -f target/${{ matrix.target }}/release/$bin && echo "OK: $bin" || { echo "MISSING: $bin"; exit 1; }
          done

  integration:
    name: Integration Tests (macOS)
    runs-on: macos-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build all binaries
        run: cargo build

      - name: Verify CLI basics
        run: |
          ./target/debug/veld --version
          ./target/debug/veld --help

      - name: Test config parsing (testproject)
        working-directory: testproject
        run: |
          ../target/debug/veld nodes
          ../target/debug/veld nodes --json
          ../target/debug/veld graph frontend:local

      - name: Verify setup guard (PRD assertion 13)
        working-directory: testproject
        run: |
          set -e
          # status should fail with exit 1 before setup
          if ../target/debug/veld status --json 2>&1; then
            echo "ERROR: status should have failed before setup"
            exit 1
          fi
          # verify the JSON error contains setup_required
          output=$(../target/debug/veld status --json 2>&1 || true)
          echo "$output" | grep -q '"setup_required"'

      - name: Test Python servers directly
        run: |
          set -e
          python3 testproject/backend/server.py 19555 &
          PID_B=$!
          python3 testproject/frontend/server.py 19556 &
          PID_F=$!
          sleep 2
          curl -sf http://localhost:19555/health
          curl -sf http://localhost:19555/
          curl -sf http://localhost:19556/
          kill $PID_B $PID_F
          wait $PID_B $PID_F 2>/dev/null || true

      - name: Run full integration tests
        run: |
          chmod +x tests/integration.sh
          sudo ./tests/integration.sh \
            --veld-bin "$(pwd)/target/debug/veld" \
            --project-dir "$(pwd)/testproject"
