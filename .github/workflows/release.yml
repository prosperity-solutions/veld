name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions: {}

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
      new_release_notes: ${{ steps.semantic.outputs.new_release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: cycjimmy/semantic-release-action@v4
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.suffix }})
    permissions:
      contents: read
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-arm64
            goos: darwin
            goarch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: macos-amd64
            goos: darwin
            goarch: amd64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-amd64
            goos: linux
            goarch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-arm64
            cross: true
            goos: linux
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.new_release_git_tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Set release version in Cargo.toml
        run: |
          VERSION="${{ needs.release.outputs.new_release_version }}"
          sed -i'' -e "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" Cargo.toml

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      # Build Caddy with the veld_inject plugin from this repo.
      # xcaddy builds from local source — no Go module proxy needed.
      - name: Build Caddy with veld_inject
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
          xcaddy build \
            --with github.com/prosperity-solutions/veld/caddy/inject=./caddy/inject \
            --output dist/caddy
          chmod +x dist/caddy

      - name: Package binaries
        run: |
          mkdir -p dist
          for bin in veld veld-helper veld-daemon; do
            cp target/${{ matrix.target }}/release/$bin dist/
          done
          tar -czf veld-${{ needs.release.outputs.new_release_version }}-${{ matrix.suffix }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: veld-${{ matrix.suffix }}
          path: veld-*.tar.gz

  publish:
    name: Publish Release
    permissions:
      contents: write
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt

      - name: Write release notes
        run: echo "$RELEASE_NOTES" > release-notes.md
        env:
          RELEASE_NOTES: ${{ needs.release.outputs.new_release_notes }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.new_release_git_tag }}
          name: ${{ needs.release.outputs.new_release_git_tag }}
          body_path: release-notes.md
          files: artifacts/*
