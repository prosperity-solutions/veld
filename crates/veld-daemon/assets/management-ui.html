<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Veld</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#181a24;--surface2:#1f2233;--border:#2a2d3e;
  --text:#e0e0e6;--text2:#8b8fa3;
  --accent:#C4F56A;--accent-bg:rgba(196,245,106,.12);
  --blue:#6c8cff;
  --green:#3dd68c;--green-bg:rgba(61,214,140,.1);
  --yellow:#f0c040;--yellow-bg:rgba(240,192,64,.1);
  --red:#f06060;--red-bg:rgba(240,96,96,.1);
  --dim:#555870;
  --radius:8px;
  --mono:'SF Mono',SFMono-Regular,Menlo,Consolas,monospace;
}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--text)}
body{min-height:100vh;padding:0}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
button{font-family:inherit;cursor:pointer}

.shell{max-width:960px;margin:0 auto;padding:24px 20px}
header{display:flex;align-items:baseline;gap:12px;margin-bottom:32px}
header .wordmark{height:22px;flex-shrink:0;align-self:baseline;position:relative;top:2px}
header .wordmark path{fill:var(--text)}
header .wordmark path:last-child{fill:var(--accent)}
header .sep{color:var(--dim);font-weight:300;font-size:20px}
header .subtitle{color:var(--text2);font-weight:400;font-size:14px}
.meta{display:flex;align-items:center;gap:16px;margin-left:auto;font-size:12px;color:var(--text2)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block}
.dot.off{background:var(--dim)}

/* top-level Active/History view switcher — centered in the header row */
header{position:relative}
.view-switch{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;gap:2px;padding:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;width:fit-content}
.view-switch .seg-btn{flex:none;padding:4px 14px}
.view-switch .count{color:var(--dim);font-weight:400;margin-left:4px}
.view-switch .seg-btn.active .count{color:inherit;opacity:.7}
@media (max-width:640px){.view-switch{position:static;transform:none;margin-left:auto;margin-right:12px}}

.empty{text-align:center;padding:80px 20px;color:var(--text2)}
.empty h2{font-size:16px;font-weight:500;margin-bottom:8px;color:var(--text)}
.empty p{font-size:13px;line-height:1.6}
.empty code{background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:13px}

.shares-panel{margin-bottom:28px}
.shares-panel h3{font-size:11px;text-transform:uppercase;letter-spacing:.09em;color:var(--text2);font-weight:600;margin:16px 0 8px}
.shares-panel h3:first-child{margin-top:0}
.share-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:8px}
.share-row.pending{border-color:var(--yellow);background:var(--yellow-bg)}
.share-row .grow{flex:1;min-width:0}
.share-row .sid{font-family:var(--mono);font-size:11px;color:var(--text2)}
.share-row .urls{font-size:13px;word-break:break-all;margin-bottom:2px}
.share-row .surl{display:block;line-height:1.5}
.share-row .label{font-weight:600}
.share-row .nid{font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:2px}
.sbtn{border:1px solid var(--border);background:var(--surface2);color:var(--text);border-radius:6px;padding:6px 12px;font-size:12px;flex-shrink:0}
.sbtn:hover{border-color:var(--text2)}
.sbtn.approve{border-color:var(--green);color:var(--green)}
.sbtn.approve:hover{background:var(--green-bg)}
.sbtn.deny,.sbtn.danger{border-color:var(--red);color:var(--red)}
.sbtn.deny:hover,.sbtn.danger:hover{background:var(--red-bg)}

.join-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.join-overlay[hidden]{display:none}
.join-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px;max-width:560px;width:100%;text-align:center}
.join-card h2{font-size:19px;margin-bottom:10px}
.join-card p{color:var(--text2);font-size:14px;line-height:1.5}
.join-card .big{font-size:40px;margin-bottom:6px}
.join-card .urls{margin:16px 0;text-align:left}
.join-card .surl{display:block;margin:6px 0;word-break:break-all;font-size:14px}
.join-card a.sbtn{display:inline-block;margin-top:18px;text-decoration:none}

.share-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 18px;margin-bottom:10px;border-top:1px solid var(--border);font-size:12px}
.share-bar .share-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0}
.share-bar .share-on{color:var(--text2)}
.share-bar .share-on b{color:var(--text);font-weight:600}
.share-bar .share-conn{color:var(--text2);display:inline-flex;align-items:center;gap:5px}
.share-bar .share-conn .conn-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0}
.share-bar .share-conn.relayed{color:var(--yellow)}
.share-bar .share-conn.relayed .conn-dot{background:var(--yellow)}
.share-bar .share-toggle{display:flex;align-items:center;gap:6px;color:var(--text2);cursor:pointer;margin-left:auto}
.share-bar .share-toggle input{appearance:none;-webkit-appearance:none;width:15px;height:15px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);cursor:pointer;position:relative;flex-shrink:0}
.share-bar .share-toggle input:hover{border-color:var(--text2)}
.share-bar .share-toggle input:checked{background:var(--accent);border-color:var(--accent)}
.share-bar .share-toggle input:checked::after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;border:solid var(--bg);border-width:0 2px 2px 0;transform:rotate(45deg)}
.card-btn.danger{color:var(--red)}
.card-btn.danger:hover{background:var(--red-bg);border-color:var(--red)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.card-head{display:flex;align-items:center;gap:8px;padding:14px 18px 10px}
.card-run{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text)}
.card-project{font-size:13px;color:var(--text2)}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em}
.badge.running,.badge.healthy{background:var(--green-bg);color:var(--green)}
.badge.stopped{background:rgba(85,88,112,.15);color:var(--dim)}
.badge.starting,.badge.stopping,.badge.health_checking,.badge.pending{background:var(--yellow-bg);color:var(--yellow)}
.badge.failed,.badge.crashed{background:var(--red-bg);color:var(--red)}
.badge.unhealthy{background:var(--yellow-bg,#3d3800);color:var(--yellow)}
.badge.skipped{background:rgba(85,88,112,.15);color:var(--dim)}

/* last-run outcome line on ended environments */
.card-outcome{padding:0 18px 10px;font-size:12px;color:var(--text2)}
.card-outcome.err{color:var(--red)}
.card-outcome .when{color:var(--dim)}
/* history run selector in the card head (ended environments with >1 run) */
.hist-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:11px;padding:2px 8px;border-radius:4px;font-family:inherit;max-width:220px}
.hist-select:focus{outline:none;border-color:var(--accent)}

.card-path{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:rtl;unicode-bidi:plaintext;flex:1;min-width:0}
.card-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:0 18px 12px}
.card-btn{background:none;border:1px solid var(--border);color:var(--text2);font-size:11px;padding:3px 8px;border-radius:5px;transition:color .15s,border-color .15s}
.card-btn:hover{color:var(--text);border-color:var(--text2)}
.card-btn.ok{color:var(--green);border-color:var(--green)}

/* segmented control */
.segmented{display:flex;gap:2px;padding:4px;margin:0 14px 10px;background:var(--bg);border-radius:8px}
.seg-btn{flex:1;text-align:center;padding:6px 0;font-size:12px;font-weight:500;color:var(--text2);background:transparent;border:none;border-radius:6px;transition:background .15s,color .15s}
.seg-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.seg-btn.active{background:var(--accent-bg);color:var(--accent)}

.tab-panel{display:none;padding:14px 18px}
.tab-panel.active{display:block}

/* health dot */
.health-dot{width:7px;height:7px;border-radius:50%;display:inline-block;vertical-align:middle;margin-left:6px;cursor:default}
.health-dot.healthy,.health-dot.running{background:var(--green)}
.health-dot.starting,.health-dot.health_checking,.health-dot.pending{background:var(--yellow)}
.health-dot.failed{background:var(--red)}
.health-dot.unhealthy{background:var(--yellow)}
.health-dot.stopped,.health-dot.skipped{background:var(--dim)}
.svc-liveness{font-size:11px;color:var(--dim);padding-left:20px}
.svc-liveness .warn{color:var(--yellow)}
.svc-liveness .err{color:var(--red)}

/* services table (merged URLs + debug) */
.svc-table{width:100%;font-size:12px;border-collapse:collapse}
.svc-table th{text-align:left;color:var(--text2);font-weight:500;padding:4px 8px 6px 0;border-bottom:1px solid var(--border)}
.svc-table td{padding:5px 8px 5px 0;vertical-align:middle}
.svc-table .svc-node{font-family:var(--mono);font-weight:500;white-space:nowrap}
.svc-table .svc-url a{color:var(--blue)}
.svc-table .svc-url a:hover{text-decoration:underline}
.svc-table .svc-url-btns{white-space:nowrap}
.svc-table .svc-url-btns button{background:none;border:none;color:var(--text2);font-size:11px;padding:2px 5px;cursor:pointer;border-radius:3px}
.svc-table .svc-url-btns button:hover{color:var(--blue);background:rgba(108,140,255,.06)}
.svc-table .svc-url-btns button.ok{color:var(--green)}
.svc-table .svc-dim{color:var(--text2)}
.svc-table .svc-pid{color:var(--dim);font-family:var(--mono);font-size:11px}
.svc-table .svc-stats{white-space:nowrap;font-family:var(--mono);font-size:11px}
.svc-table .svc-stats .stat-mem{color:var(--text)}
.svc-table .svc-stats .stat-cpu{margin-left:8px;color:var(--text2)}
.svc-table .svc-stats .stat-spark{margin-left:8px;vertical-align:middle}
.svc-table .svc-stats .stat-spark polyline{fill:none;stroke:var(--accent);stroke-width:1.25;stroke-linejoin:round;stroke-linecap:round}
.svc-table .svc-stats .stat-none{color:var(--dim)}
.svc-empty{color:var(--dim);font-size:12px;padding:8px 0}

/* log tab */
.log-bar{display:flex;align-items:center;gap:8px;padding:0 0 8px;font-size:11px;color:var(--text2)}
.log-bar select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:11px;padding:2px 8px;border-radius:4px;font-family:inherit}
.log-bar select:focus{outline:none;border-color:var(--accent)}
.log-search{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:11px;padding:3px 8px;border-radius:4px;font-family:inherit;width:160px;transition:border-color .15s}
.log-search:focus{outline:none;border-color:var(--accent)}
.log-search::placeholder{color:var(--dim)}
.log-match-count{font-size:10px;color:var(--dim);min-width:40px}
.ctx-ctl{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}
.ctx-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;font-size:10px;padding:2px 4px;border-radius:4px;font-family:inherit;text-align:center;-moz-appearance:textfield}
.ctx-input::-webkit-inner-spin-button,.ctx-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.ctx-input:focus{outline:none;border-color:var(--accent)}
.autoscroll-btn{background:none;border:1px solid var(--border);color:var(--text2);font-size:10px;padding:2px 8px;border-radius:4px;margin-left:auto;transition:color .15s,border-color .15s}
.autoscroll-btn.on{color:var(--accent);border-color:var(--accent)}
.log-terminal{background:#06080d;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.log-scroll{max-height:450px;overflow-y:auto;overflow-x:auto}
.log-lines{padding:6px 0;min-height:40px}
.log-line{display:flex;padding:1px 10px;font-family:var(--mono);font-size:10.5px;line-height:1.6;white-space:pre}
.log-line.ctx{opacity:.45}
.log-line:hover{background:rgba(255,255,255,.03)}
.log-line .ts{color:var(--dim);flex-shrink:0;margin-right:8px;user-select:none}
.log-line .node-tag{flex-shrink:0;margin-right:8px;font-weight:600;user-select:none}
.log-line .msg{color:var(--text);white-space:pre-wrap;word-break:break-all;min-width:0}
.log-line .msg .ann{color:var(--accent)}
.log-line mark{background:rgba(196,245,106,.25);color:var(--text);border-radius:2px;padding:0 1px}
.log-ctx-sep{text-align:center;padding:2px 0;font-size:9px;color:var(--dim);user-select:none;letter-spacing:2px}
.log-empty{padding:20px;text-align:center;color:var(--dim);font-size:12px}
.log-line .client-badge{color:var(--yellow);font-size:9px;font-weight:600;margin-right:4px;user-select:none;text-transform:uppercase;opacity:.75}
.source-filter{display:flex;gap:2px;background:var(--bg);border-radius:6px;padding:2px}
.source-filter button{background:none;border:none;color:var(--text2);font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer}
.source-filter button:hover{color:var(--text)}
.source-filter button.active{background:var(--accent-bg);color:var(--accent)}

.node-c0{color:#6c8cff}.node-c1{color:#3dd68c}.node-c2{color:#f0c040}.node-c3{color:#f06060}
.node-c4{color:#c084fc}.node-c5{color:#22d3ee}.node-c6{color:#fb923c}.node-c7{color:#f472b6}

.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.log-scroll::-webkit-scrollbar{width:6px;height:6px}
.log-scroll::-webkit-scrollbar-track{background:transparent}
.log-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.log-scroll::-webkit-scrollbar-thumb:hover{background:var(--dim)}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="shell">
  <header>
    <svg class="wordmark" viewBox="0 0 3837 1463" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M383 1463L0 423H183L470 1278H474L762 423H943L561 1463H383Z"/>
      <path d="M1507 1463C1407.67 1463 1322.17 1441 1250.5 1397C1178.83 1353 1123.83 1290.83 1085.5 1210.5C1047.17 1130.17 1028 1035.67 1028 927V926C1028 818.667 1047.33 724.167 1086 642.5C1124.67 560.833 1179 497.167 1249 451.5C1319 405.833 1401.33 383 1496 383C1590.67 383 1672.17 404.833 1740.5 448.5C1808.83 492.167 1861.33 553.333 1898 632C1934.67 710.667 1953 802 1953 906V970H1115V834H1867L1779 960V893C1779 812.333 1766.83 745.667 1742.5 693C1718.17 640.333 1684.67 601.167 1642 575.5C1599.33 549.833 1550.33 537 1495 537C1439.67 537 1390 550.5 1346 577.5C1302 604.5 1267.33 644.5 1242 697.5C1216.67 750.5 1204 815.667 1204 893V960C1204 1033.33 1216.5 1096 1241.5 1148C1266.5 1200 1302 1239.83 1348 1267.5C1394 1295.17 1448.33 1309 1511 1309C1555 1309 1594.33 1302.33 1629 1289C1663.67 1275.67 1692.67 1257.33 1716 1234C1739.33 1210.67 1756 1184 1766 1154L1769 1145H1940L1938 1155C1929.33 1197.67 1912.83 1237.67 1888.5 1275C1864.17 1312.33 1833 1345.17 1795 1373.5C1757 1401.83 1713.67 1423.83 1665 1439.5C1616.33 1455.17 1563.67 1463 1507 1463Z"/>

      <path d="M3757 1463C3801.18 1463 3837 1427.18 3837 1383C3837 1338.82 3801.18 1303 3757 1303C3712.82 1303 3677 1338.82 3677 1383C3677 1427.18 3712.82 1463 3757 1463Z"/>
    </svg>
    <span class="sep">/</span>
    <span class="subtitle">Environments</span>
    <div class="segmented view-switch" id="view-switch" hidden>
      <button class="seg-btn active" data-view="active">Active<span class="count" data-count="active"></span></button>
      <button class="seg-btn" data-view="history">History<span class="count" data-count="history"></span></button>
    </div>
    <div class="meta">
      <span id="status-dot"><span class="dot off"></span></span>
      <span id="status-text">connecting...</span>
    </div>
  </header>
  <section id="shares-panel" class="shares-panel" hidden></section>
  <main id="content"><div class="empty"><div class="spinner"></div></div></main>
</div>
<div id="join-overlay" class="join-overlay" hidden><div class="join-card"><div id="join-body"></div></div></div>
<script>
(function(){
const $=(s,p)=>(p||document).querySelector(s);
const $$=(s,p)=>(p||document).querySelectorAll(s);
const content=$('#content'),statusDot=$('#status-dot'),statusText=$('#status-text');
let lastFP=null;
let sharesByRun={};
let historyByKey={};
let joinCount=0;
// Top-level view: 'active' (live environments — the default, so ended runs
// don't clutter the everyday dashboard) or 'history' (ended environments).
let view=localStorage.getItem('veld-view')==='history'?'history':'active';
let lastEnvData=null;
const runState={},nodeColors={};
let colorIdx=0;
function nc(n){if(!(n in nodeColors))nodeColors[n]='node-c'+(colorIdx++%8);return nodeColors[n];}
function rk(proj,run){return proj+'::'+run;}
function fp(data){
  return data.projects.map(p=>{
    const rs=p.runs.map(r=>{
      const u=Object.keys(r.urls||{}).sort().map(k=>k+'='+r.urls[k]).join('|');
      const n=(r.nodes||[]).map(x=>x.name+':'+x.status).sort().join('|');
      // run_id + outcome + history length: a crash, a restart (new run id),
      // or a new history entry must re-render even when the status string
      // alone is unchanged (e.g. stopped → stopped after a failed start).
      const hist=(r.history||[]).length;
      return r.name+':'+r.status+':'+r.run_id+':'+(r.outcome||'')+':h'+hist+':'+u+':'+n;
    }).sort().join(';');
    return p.name+'/'+rs;
  }).sort().join('\n');
}

async function refresh(){
  try{
    const resp=await fetch('/api/environments');if(!resp.ok)throw 0;
    const data=await resp.json();
    // Hosted shares fold into their run card; fetch + index by run name.
    let shares=[];
    try{const sr=await fetch('/api/shares');if(sr.ok){const sd=await sr.json();shares=sd.shares||[];joinCount=(sd.joins||[]).length;}}catch(e){}
    sharesByRun={};for(const s of shares){if(s.run)(sharesByRun[s.run]||(sharesByRun[s.run]=[])).push(s);}
    const running=data.projects.reduce((n,p)=>n+p.runs.filter(r=>r.status==='running').length,0);
    const total=data.projects.reduce((n,p)=>n+p.runs.length,0);
    statusDot.innerHTML=(running>0||joinCount>0)?'<span class="dot"></span>':'<span class="dot off"></span>';
    statusText.textContent=running>0?running+' running':(joinCount>0?joinCount+' joined':(total>0?'all stopped':'no environments'));
    // The fingerprint must cover connection transport too, or a tunnel
    // upgrading relayed → direct never re-renders its badge.
    const sf=shares.map(s=>s.run+':'+s.approve+':'+s.id+':'+(s.joiners||0)+':'+(s.connections||[]).map(c=>c.transport+'@'+(c.via||'')).join('+')).sort().join(',');
    const f=fp(data)+'||'+sf+'||j'+joinCount;if(f===lastFP)return;lastFP=f;render(data);
  }catch(e){statusDot.innerHTML='<span class="dot off"></span>';statusText.textContent='disconnected';}
}

function render(data){
  lastEnvData=data;
  // View switcher: counts + visibility. Hidden entirely until something exists.
  const liveCount=data.projects.reduce((n,p)=>n+p.runs.filter(r=>r.live).length,0);
  const endedCount=data.projects.reduce((n,p)=>n+p.runs.filter(r=>!r.live).length,0);
  const sw=$('#view-switch');
  if(sw){
    sw.hidden=!(liveCount||endedCount);
    const ac=sw.querySelector('[data-count="active"]'),hc=sw.querySelector('[data-count="history"]');
    if(ac)ac.textContent=liveCount?(' '+liveCount):'';
    if(hc)hc.textContent=endedCount?(' '+endedCount):'';
    sw.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  }

  if(!data.projects.length){
    content.innerHTML=joinCount>0
      ?'<div class="empty fade-in"><h2>No local environments</h2><p>You’ve joined '+joinCount+' shared environment'+(joinCount>1?'s':'')+' — see the panel above.</p></div>'
      :'<div class="empty fade-in"><h2>No environments yet</h2><p>Start one with <code>veld start</code> in any project with a <code>veld.json</code></p></div>';
    return;
  }
  // Empty states for the selected view (there ARE environments, just not here).
  if(view==='active'&&!liveCount){
    content.innerHTML='<div class="empty fade-in"><h2>Nothing running</h2><p>'+endedCount+' ended environment'+(endedCount>1?'s':'')+' in <b>History</b>.</p></div>';
    stopHiddenLogPolling(new Set());
    return;
  }
  if(view==='history'&&!endedCount){
    content.innerHTML='<div class="empty fade-in"><h2>No ended environments</h2><p>Stopped and crashed environments land here (kept for 7 days).</p></div>';
    stopHiddenLogPolling(new Set());
    return;
  }
  for(const k of Object.keys(runState)){const s=runState[k];if(s.panelEl&&s.panelEl.parentNode)s.panelEl.parentNode.removeChild(s.panelEl);}
  let h='';
  const shownKeys=new Set();
  for(const proj of data.projects){
    const runs=proj.runs.slice()
      .filter(r=>view==='active'?r.live:!r.live)
      .sort((a,b)=>{
        if(a.status==='running'&&b.status!=='running')return -1;
        if(b.status==='running'&&a.status!=='running')return 1;
        return a.name.localeCompare(b.name);
      });
    for(const run of runs){
      shownKeys.add(rk(proj.name,run.name));
      const key=rk(proj.name,run.name);
      const st=runState[key]||{tab:'services'};

      // A run may host a peer share and/or one or more web shares at once
      // (separate capabilities). Split them: web shares carry public_urls.
      const runShares=(run.status==='running')?(sharesByRun[run.name]||[]):[];
      const peerShare=runShares.find(x=>!(x.public_urls&&x.public_urls.length))||null;
      const webShares=runShares.filter(x=>x.public_urls&&x.public_urls.length);
      const live=!!run.live;
      // History run selection: an ended environment's card can show any past
      // run (badge, outcome, node table). '' / unset = the latest ended run
      // (the card's own data); otherwise a run_id from run.history.
      const hist=run.history||[];
      const histSel=(!live&&st.histSel)?hist.find(x=>x.run_id===st.histSel):null;
      if(st.histSel&&!histSel)st.histSel=null; // selected run got pruned
      const shownStatus=histSel?histSel.status:run.status;
      const shownOutcome=histSel?histSel.outcome:run.outcome;
      const shownEnded=histSel?histSel.ended_at:run.ended_at;
      // Node table follows the shown run. History nodes carry only
      // name/variant/status/exit_code — url/pid/actions are absent, which
      // the table already renders as dashes/blank (the run is over).
      const nodes=(histSel?histSel.nodes:run.nodes)||[];

      h+='<div class="card fade-in" data-key="'+esc(key)+'" data-run="'+esc(run.name)+'" data-path="'+esc(proj.project_root)+'">';
      // Zone 1 — identity: environment name primary, project + path as
      // context, status of the shown run.
      h+='<div class="card-head">';
      h+='<span class="card-run">'+esc(run.name)+'</span>';
      h+='<span class="card-project">'+esc(proj.name)+'</span>';
      h+='<span class="card-path" title="'+esc(proj.project_root)+'">'+esc(proj.project_root)+'</span>';
      if(!live&&hist.length){
        h+='<select class="hist-select" data-action="hist-select" title="Show an older run">';
        h+='<option value=""'+(histSel?'':' selected')+'>'+esc((run.outcome||run.status)+(run.ended_at?' · '+fmtWhen(run.ended_at):''))+'</option>';
        for(const e2 of hist){
          h+='<option value="'+esc(e2.run_id)+'"'+(histSel&&histSel.run_id===e2.run_id?' selected':'')+'>'
            +esc((e2.outcome||e2.status)+' · '+fmtWhen(e2.created_at))+'</option>';
        }
        h+='</select>';
      }
      h+='<span class="badge '+esc(shownStatus)+'">'+esc(shownStatus)+'</span>';
      h+='</div>';
      // Shown run's outcome — the "why did it die" line ("crashed at 3am" →
      // open card, read outcome, hit Restart).
      if(!live&&shownOutcome){
        const bad=shownStatus==='crashed'||shownStatus==='failed';
        h+='<div class="card-outcome'+(bad?' err':'')+'">'+esc(shownOutcome)
          +(shownEnded?' <span class="when">· ended '+esc(fmtWhen(shownEnded))+'</span>':'')
          +'</div>';
      }
      // Zone 2 — one action toolbar (lifecycle + utility + share).
      h+='<div class="card-toolbar">';
      h+='<button class="card-btn" data-action="restart-env" title="'+(live?'Restart environment':'Start this environment again')+'">Restart</button>';
      if(live){
        h+='<button class="card-btn" data-action="stop-env" title="Stop environment">Stop</button>';
      }
      h+='<button class="card-btn" data-action="open-terminal" title="Open in Terminal">Terminal</button>';
      h+='<button class="card-btn" data-action="copy-path" title="Copy path">Copy path</button>';
      if(run.status==='running'&&!peerShare){
        h+='<button class="card-btn" data-action="start-share" data-run="'+esc(run.name)+'" title="Share over an encrypted P2P tunnel">Share</button>';
      }else if(peerShare){
        h+='<button class="card-btn danger" data-action="stop-share" data-share="'+esc(peerShare.id)+'" title="Stop sharing">Stop sharing</button>';
      }
      if(run.status==='running'&&!webShares.length){
        h+='<button class="card-btn" data-action="start-web-share" data-run="'+esc(run.name)+'" title="Publish the web-opted services on the public web (password-protected)">Share to web</button>';
      }
      h+='</div>';
      // Peer share status strip.
      if(peerShare){
        h+='<div class="share-bar">';
        h+='<span class="share-dot"></span>';
        h+='<span class="share-on">Sharing'+(peerShare.joiners?(' · <b>'+peerShare.joiners+'</b> connected'):'')+'</span>';
        h+='<button class="card-btn" data-action="copy-join" data-joinurl="'+esc(peerShare.join_url||'')+'">Copy link</button>';
        h+='<button class="card-btn" data-action="copy-join-cmd" data-ticket="'+esc(peerShare.ticket||'')+'">Copy command</button>';
        h+='<label class="share-toggle" title="Approve every joiner automatically"><input type="checkbox" data-action="toggle-auto" data-share="'+esc(peerShare.id)+'"'+(peerShare.approve==='auto'?' checked':'')+'> auto-accept</label>';
        h+=connSpans(peerShare);
        h+='</div>';
      }
      // Public web share strip(s) — started from the CLI (`veld share --web`);
      // shows the minted public URLs and a stop button. Password-protected by
      // default: the share password is shown with a copy button, and
      // password-mode URLs get a one-link copy (URL + `#veld-key=…` fragment)
      // so a recipient can be sent a single working link. No auto-accept
      // toggle: web shares always auto-approve the gateway.
      for(const w of webShares){
        h+='<div class="share-bar">';
        h+='<span class="share-dot"></span>';
        h+='<span class="share-on">Public web</span>';
        for(const u of (w.public_urls||[])){
          const pwProtected=w.web_password&&u.access!=='link';
          const oneLink=pwProtected?(u.public_url+'/#veld-key='+encodeURIComponent(w.web_password)):u.public_url;
          const label=pwProtected?(u.node+' link (with password)'):(u.node+' URL');
          h+='<button class="card-btn" data-action="copy-public" data-url="'+esc(oneLink)+'" title="'+esc(pwProtected?(u.public_url+' — copies a one-link that opens with the password already filled in'):u.public_url)+'">'+esc(label)+'</button>';
        }
        if(w.web_password){
          h+='<button class="card-btn" data-action="copy-public" data-url="'+esc(w.web_password)+'" title="Copy the viewer password (send it on a separate channel from the URL)">Copy password</button>';
        }
        h+='<button class="card-btn danger" data-action="stop-share" data-share="'+esc(w.id)+'" title="Stop public web share">Stop web</button>';
        h+=connSpans(w);
        h+='</div>';
      }
      // Segmented control
      h+='<div class="segmented">';
      h+='<button class="seg-btn'+(st.tab==='services'?' active':'')+'" data-action="tab" data-tab="services">Services</button>';
      h+='<button class="seg-btn'+(st.tab==='logs'?' active':'')+'" data-action="tab" data-tab="logs">Logs</button>';
      h+='</div>';
      // Services panel (merged URLs + debug)
      h+='<div class="tab-panel'+(st.tab==='services'?' active':'')+'" data-panel="services">';
      if(nodes.length){
        h+='<table class="svc-table"><thead><tr><th>Node</th><th>URL</th><th></th><th>Variant</th><th>PID</th><th>Resources</th></tr></thead><tbody>';
        for(const n of nodes){
          const url=n.url||'';
          h+='<tr><td class="svc-node">'+esc(n.name)+'<span class="health-dot '+esc(n.status)+'" title="'+esc(n.status)+'"></span></td>';
          h+='<td class="svc-url">'+(url?'<a href="'+esc(url)+'" target="_blank" rel="noopener">'+esc(shortUrl(url))+'</a>':'<span style="color:var(--dim)">&ndash;</span>')+'</td>';
          h+='<td class="svc-url-btns">';
          if(url){
            h+='<button data-action="copy-url" data-url="'+esc(url)+'">Copy</button>';
            h+='<button data-action="open-url" data-url="'+esc(url)+'">Open</button>';
          }
          if(run.status==='running'&&Array.isArray(n.actions)){
            for(const a of n.actions){
              h+='<button data-action="run-action" data-act="'+esc(a.name)+'" data-node="'+esc(n.name)+'" title="Run the '+esc(a.label)+' action">'+esc(a.label)+'</button>';
            }
          }
          h+='</td>';
          h+='<td class="svc-dim">'+esc(n.variant)+'</td>';
          h+='<td class="svc-pid">'+(n.pid||'')+'</td>';
          // Resources cell — patched in place by refreshStats() on its own
          // cadence (kept out of the /api/environments fingerprint so live
          // numbers never trigger a full card re-render).
          h+='<td class="svc-stats" data-statkey="'+esc(n.name+':'+n.variant)+'"><span class="stat-none">&ndash;</span></td></tr>';
          if(n.recovery_count||n.consecutive_failures||n.last_liveness_error){
            h+='<tr><td colspan="6" class="svc-liveness">';
            var parts=[];
            if(n.consecutive_failures)parts.push('<span class="warn">failures: '+n.consecutive_failures+'</span>');
            if(n.recovery_count)parts.push('recoveries: '+n.recovery_count);
            if(n.last_liveness_error)parts.push('<span class="err">'+esc(n.last_liveness_error)+'</span>');
            h+=parts.join(' &middot; ');
            h+='</td></tr>';
          }
        }
        h+='</tbody></table>';
      }else{h+='<div class="svc-empty">No services</div>';}
      h+='</div>';
      // Logs placeholder
      h+='<div class="tab-panel'+(st.tab==='logs'?' active':'')+'" data-panel="logs" data-loghost="'+esc(key)+'"></div>';
      h+='</div>';
    }
  }
  content.innerHTML=h;
  // Run history per card, for the logs run picker (kept out of the DOM
  // string — the picker lives in the persistent log panel element).
  historyByKey={};
  for(const proj of data.projects)for(const run of proj.runs)historyByKey[rk(proj.name,run.name)]=run.history||[];
  for(const k of Object.keys(runState)){
    const s=runState[k];
    const host=$('[data-loghost="'+CSS.escape(k)+'"]');
    if(host&&s.panelEl)host.appendChild(s.panelEl);
    if(s.panelEl)updateRunPicker(k,s);
    if(s.tab==='logs'&&!s.logInterval&&shownKeys.has(k))startLogPolling(k);
  }
  stopHiddenLogPolling(shownKeys);
  // Freshly rendered cells are placeholders; fill them without waiting for the
  // next stats tick.
  refreshStats();
}

// Stop log polling for any card not currently rendered (the other view) —
// its panel keeps its state and resumes when the view shows it again.
function stopHiddenLogPolling(shownKeys){
  for(const k of Object.keys(runState)){
    if(!shownKeys.has(k))stopLogPolling(k);
  }
}

// --- Log panel ---

function ensureLogPanel(key){
  let s=runState[key];if(!s){s=runState[key]={tab:'logs'};}
  if(s.panelEl)return s;
  s.autoScroll=true;s.knownNodes=new Map();s.prevHtml=null;s.fetching=false;s.logFilter='';s.searchTerm='';s.ctxLines=5;
  s.lastData=null;s.sourceFilter='all';s.runFilter=''; // cache raw data for re-renders
  const el=document.createElement('div');
  el.innerHTML=
    '<div class="log-bar">'+
      '<select class="run-filter" data-action="run-filter" title="Which run instance to read"><option value="">Latest run</option><option value="all">All runs</option></select>'+
      '<select class="node-filter" data-action="log-filter"><option value="">All nodes</option></select>'+
      '<div class="source-filter">'+
        '<button class="active" data-action="source-filter" data-source="all">All</button>'+
        '<button data-action="source-filter" data-source="server">Server</button>'+
        '<button data-action="source-filter" data-source="client">Client</button>'+
        '<button data-action="source-filter" data-source="internal">Internal</button>'+
      '</div>'+
      '<input class="log-search" type="text" placeholder="Search logs..." data-action="log-search">'+
      '<span class="log-match-count"></span>'+
      '<span class="ctx-ctl" style="display:none">Context <input class="ctx-input" type="number" min="0" max="50" value="5" data-action="ctx-change"></span>'+
      '<button class="autoscroll-btn on" data-action="autoscroll">Auto-scroll ON</button>'+
    '</div>'+
    '<div class="log-terminal"><div class="log-scroll"><div class="log-lines"><div class="log-empty">Loading logs...</div></div></div></div>';
  s.panelEl=el;
  const scroll=el.querySelector('.log-scroll');
  scroll.addEventListener('scroll',()=>{
    const atBottom=scroll.scrollHeight-scroll.scrollTop-scroll.clientHeight<40;
    if(atBottom&&!s.autoScroll){s.autoScroll=true;updateAutoScrollBtn(el,true);}
    else if(!atBottom&&s.autoScroll){s.autoScroll=false;updateAutoScrollBtn(el,false);}
  });
  return s;
}

function updateAutoScrollBtn(el,on){
  const btn=el.querySelector('.autoscroll-btn');if(!btn)return;
  btn.classList.toggle('on',on);btn.textContent=on?'Auto-scroll ON':'Auto-scroll OFF';
}

// Rebuild the run picker's history options in place: "Latest run", then each
// ended predecessor as "<outcome> · <start time>", then "All runs". The
// current selection survives re-renders; a selection whose run was pruned
// falls back to the latest run.
function updateRunPicker(key,s){
  if(!s.panelEl)return;const sel=s.panelEl.querySelector('.run-filter');if(!sel)return;
  const hist=historyByKey[key]||[];
  const sig=hist.map(x=>x.run_id).join(',');
  if(sel.dataset.sig!==sig){
    sel.dataset.sig=sig;
    sel.innerHTML='';
    const add=(val,label)=>{const o=document.createElement('option');o.value=val;o.textContent=label;sel.appendChild(o);};
    add('','Latest run');
    for(const e of hist)add(e.run_id,(e.outcome||e.status)+' · '+fmtWhen(e.created_at));
    add('all','All runs');
  }
  // Always re-apply the state's selection — it can change without the
  // history signature changing (e.g. the card's history run selector
  // scoped the logs to a past run). A pruned selection falls back to latest.
  const v=s.runFilter||'';
  sel.value=Array.from(sel.options).some(o=>o.value===v)?v:'';
  if(sel.value!==v){s.runFilter=sel.value;}
}

// Compact local time for outcome lines / picker labels: "14:32" today,
// "Jul 20 14:32" otherwise.
function fmtWhen(iso){
  const d=new Date(iso);if(isNaN(d))return iso;
  const now=new Date();
  const hm=d.toTimeString().slice(0,5);
  if(d.toDateString()===now.toDateString())return hm;
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+hm;
}

function startLogPolling(key){
  const s=runState[key];if(!s||s.logInterval)return;
  const runName=$('[data-key="'+CSS.escape(key)+'"]')?.dataset.run;if(!runName)return;
  const panel=ensureLogPanel(key);
  updateRunPicker(key,panel);
  const host=$('[data-loghost="'+CSS.escape(key)+'"]');
  if(host&&s.panelEl&&!s.panelEl.parentNode)host.appendChild(s.panelEl);
  fetchLogs(key,runName);
  s.logInterval=setInterval(()=>fetchLogs(key,runName),2000);
}

function stopLogPolling(key){const s=runState[key];if(!s)return;if(s.logInterval){clearInterval(s.logInterval);s.logInterval=null;}}

async function fetchLogs(key,runName){
  const s=runState[key];if(!s||s.fetching)return;s.fetching=true;
  try{
    const src=s.sourceFilter||'all';
    // '' = latest run (server default); a short id or 'all' scopes the read.
    const rq=s.runFilter?('&run_id='+encodeURIComponent(s.runFilter)):'';
    const resp=await fetch('/api/logs/'+encodeURIComponent(runName)+'?lines=500&source='+src+rq);
    if(!resp.ok)return;
    const data=await resp.json();
    for(const nd of data.nodes)s.knownNodes.set(nd.node,nd.variant);
    updateNodeDropdown(s);
    s.lastData=data;
    doRenderLogs(key);
  }catch(e){}
  finally{if(runState[key])runState[key].fetching=false;}
}

function doRenderLogs(key){
  const s=runState[key];if(!s||!s.lastData)return;
  const data=s.logFilter?{nodes:s.lastData.nodes.filter(n=>n.node===s.logFilter)}:s.lastData;
  renderLogs(key,data,s.lastData.nodes.length);
}

function updateNodeDropdown(s){
  if(!s.panelEl)return;const sel=s.panelEl.querySelector('.node-filter');if(!sel)return;
  const entries=Array.from(s.knownNodes.entries()).sort((a,b)=>a[0].localeCompare(b[0]));
  const keys=entries.map(e=>e[0]);
  const cur=Array.from(sel.options).slice(1).map(o=>o.value);
  if(keys.join(',')==cur.join(','))return;
  const v=sel.value;while(sel.options.length>1)sel.remove(1);
  for(const[node,variant]of entries){const o=document.createElement('option');o.value=node;o.textContent=node+':'+variant;sel.appendChild(o);}
  sel.value=v;
}

function renderLogs(key,data,totalNodes){
  const s=runState[key];if(!s||!s.panelEl)return;
  const linesEl=s.panelEl.querySelector('.log-lines');
  const scrollEl=s.panelEl.querySelector('.log-scroll');
  if(!linesEl||!scrollEl)return;

  const raw=[];
  for(const nd of data.nodes)for(const line of nd.lines)raw.push({node:nd.node,variant:nd.variant,source:nd.source||'server',raw:line,ts:extractTs(line)||''});
  raw.sort((a,b)=>{const da=new Date(a.ts),db=new Date(b.ts);const va=isNaN(da)?Infinity:da.getTime(),vb=isNaN(db)?Infinity:db.getTime();const c=va-vb;return c!==0?c:a.node.localeCompare(b.node);});
  if(!raw.length){linesEl.innerHTML='<div class="log-empty">No log output yet</div>';s.prevHtml=null;return;}

  // Build merged entries. Continuation lines are pre-merged by the API
  // (merge_continuation_lines on the server), so each raw entry is a
  // complete logical log entry that may contain embedded newlines.
  const merged=[];
  for(const e of raw)merged.push({...e,fullMsg:extractMsg(e.raw)});

  const search=s.searchTerm.toLowerCase();
  const ctx=s.ctxLines||0;
  const multi=totalNodes>1;

  // Show/hide context controls.
  const ctxCtl=s.panelEl.querySelector('.ctx-ctl');
  if(ctxCtl)ctxCtl.style.display=search?'':'none';

  let h='',matchCount=0;

  if(search){
    // Find matching indices.
    const matches=new Set();
    const searchRe=new RegExp(search.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i');
    for(let i=0;i<merged.length;i++){
      if(searchRe.test(merged[i].fullMsg)||searchRe.test(merged[i].node))matches.add(i);
    }
    matchCount=matches.size;
    // Expand context around matches.
    const visible=new Set();
    for(const i of matches){
      for(let j=Math.max(0,i-ctx);j<=Math.min(merged.length-1,i+ctx);j++)visible.add(j);
    }
    let prevIdx=-2;
    for(let i=0;i<merged.length;i++){
      if(!visible.has(i))continue;
      if(prevIdx>=0&&i-prevIdx>1)h+='<div class="log-ctx-sep">...</div>';
      const e=merged[i];const isMatch=matches.has(i);
      h+=logLineHtml(e,multi,isMatch?search:'',!isMatch);
      prevIdx=i;
    }
  }else{
    for(const e of merged)h+=logLineHtml(e,multi,'',false);
  }

  const countEl=s.panelEl.querySelector('.log-match-count');
  if(countEl)countEl.textContent=search?(matchCount+' match'+(matchCount!==1?'es':'')):'';

  if(h===s.prevHtml)return;
  s.prevHtml=h;
  linesEl.innerHTML=h||'<div class="log-empty">No matching lines</div>';
  if(s.autoScroll)scrollEl.scrollTop=scrollEl.scrollHeight;
}

function logLineHtml(e,multi,search,isCtx){
  const msg=e.fullMsg;const isAnn=msg.startsWith('[VELD]');const isClient=e.source==='client';
  let h='<div class="log-line'+(isCtx?' ctx':'')+'">';
  if(e.ts)h+='<span class="ts">'+esc(fmtTs(e.ts))+'</span>';
  if(multi)h+='<span class="node-tag '+nc(e.node)+'">'+esc(e.node)+':'+esc(e.variant)+(isClient?':client':'')+'</span>';
  else if(isClient)h+='<span class="client-badge">client</span>';
  let msgHtml=isAnn?'<span class="ann">'+esc(msg)+'</span>':esc(msg);
  if(search)msgHtml=highlightSearch(msgHtml,search);
  h+='<span class="msg">'+msgHtml+'</span></div>';
  return h;
}

function highlightSearch(html,term){
  const escTerm=esc(term);if(!escTerm)return html;
  // Only highlight inside text content, not inside HTML tags or attributes.
  const re=new RegExp('('+escTerm.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return html.replace(/(<[^>]*>)|([^<]+)/g,(m,tag,text)=>tag?tag:text.replace(re,'<mark>$1</mark>'));
}

document.addEventListener('click',e=>{
  const vb=e.target.closest('#view-switch .seg-btn');
  if(vb){
    if(vb.dataset.view!==view){
      view=vb.dataset.view;
      localStorage.setItem('veld-view',view);

    }
    return;
  }
  const card=e.target.closest('.card');
  const tabBtn=e.target.closest('[data-action="tab"]');

    const key=card.dataset.key,tab=tabBtn.dataset.tab;
    let s=runState[key];if(!s){s=runState[key]={};}
    s.tab=tab;
    $$('.seg-btn',card).forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
    $$('.tab-panel',card).forEach(p=>p.classList.toggle('active',p.dataset.panel===tab));

      if(host&&s.panelEl&&!s.panelEl.parentNode)host.appendChild(s.panelEl);
      s.autoScroll=true;if(s.panelEl)updateAutoScrollBtn(s.panelEl,true);
      startLogPolling(key);
    }else{stopLogPolling(key);}
    return;
  }
  const srcBtn=e.target.closest('[data-action="source-filter"]');
  if(srcBtn&&card){
    const key=card.dataset.key,s=runState[key];
    if(s){
      s.sourceFilter=srcBtn.dataset.source;
      s.prevHtml=null;s.lastData=null;
      const btns=srcBtn.parentElement.querySelectorAll('button');
      btns.forEach(b=>b.classList.toggle('active',b.dataset.source===s.sourceFilter));
      // Immediately re-fetch with new source filter.
      const runName=card.dataset.run;if(runName)fetchLogs(key,runName);
    }
    return;
  }
  if(e.target.closest('[data-action="autoscroll"]')&&card){
    const s=runState[card.dataset.key];
    if(s){s.autoScroll=!s.autoScroll;updateAutoScrollBtn(s.panelEl,s.autoScroll);
      if(s.autoScroll){const sc=s.panelEl?.querySelector('.log-scroll');if(sc)sc.scrollTop=sc.scrollHeight;}}
    return;
  }
  const copyUrl=e.target.closest('[data-action="copy-url"]');
  if(copyUrl){navigator.clipboard.writeText(copyUrl.dataset.url).then(()=>{copyUrl.classList.add('ok');copyUrl.textContent='Copied';setTimeout(()=>{copyUrl.classList.remove('ok');copyUrl.textContent='Copy';},1500);});return;}
  const copyPublic=e.target.closest('[data-action="copy-public"]');
  if(copyPublic){const orig=copyPublic.textContent;navigator.clipboard.writeText(copyPublic.dataset.url).then(()=>{copyPublic.classList.add('ok');copyPublic.textContent='Copied';setTimeout(()=>{copyPublic.classList.remove('ok');copyPublic.textContent=orig;},1500);});return;}
  const openUrl=e.target.closest('[data-action="open-url"]');
  if(openUrl){window.open(openUrl.dataset.url,'_blank','noopener');return;}
  const runAction=e.target.closest('[data-action="run-action"]');
  if(runAction&&card){
    const btn=runAction,orig=btn.textContent;btn.disabled=true;btn.textContent='Running…';
    fetch('/api/environments/'+encodeURIComponent(card.dataset.run)+'/action',{method:'POST',headers:{'Content-Type':'application/json','X-Veld-Request':'1'},body:JSON.stringify({action:btn.dataset.act,node:btn.dataset.node})})
      .then(r=>{if(!r.ok)btn.textContent='Failed';})
      .catch(()=>{btn.textContent='Failed';})
      .finally(()=>{setTimeout(()=>{btn.textContent=orig;btn.disabled=false;},1500);});
    return;
  }
  if(e.target.closest('[data-action="copy-path"]')&&card){const btn=e.target.closest('[data-action="copy-path"]');navigator.clipboard.writeText(card.dataset.path).then(()=>{btn.classList.add('ok');btn.textContent='Copied';setTimeout(()=>{btn.classList.remove('ok');btn.textContent='Copy path';},1500);});return;}
  if(e.target.closest('[data-action="open-terminal"]')&&card){fetch('/api/open-terminal',{method:'POST',headers:{'Content-Type':'application/json','X-Veld-Request':'1'},body:JSON.stringify({path:card.dataset.path})});return;}
  if(e.target.closest('[data-action="stop-env"]')&&card){
    if(!confirm('Stop environment "'+card.dataset.run+'"?'))return;
    const btn=e.target.closest('[data-action="stop-env"]');btn.textContent='Stopping...';btn.disabled=true;
    fetch('/api/environments/'+encodeURIComponent(card.dataset.run)+'/stop',{method:'POST',headers:{'X-Veld-Request':'1'}});
    return;
  }
  if(e.target.closest('[data-action="restart-env"]')&&card){
    const btn=e.target.closest('[data-action="restart-env"]');btn.textContent='Restarting...';btn.disabled=true;
    fetch('/api/environments/'+encodeURIComponent(card.dataset.run)+'/restart',{method:'POST',headers:{'X-Veld-Request':'1'}});
    return;
  }
});

function extractTs(l){if(l.charAt(0)!=='[')return null;const e=l.indexOf(']');if(e<0)return null;const t=l.substring(1,e);return/^\d{4}-\d{2}-\d{2}T/.test(t)?t:null;}
function extractMsg(l){const e=l.indexOf(']');if(e<0||l.charAt(0)!=='[')return l;return l.substring(e+2);}
function fmtTs(ts){const i=ts.indexOf('T');if(i<0)return ts;let t=ts.substring(i+1).replace(/[Z+].*$/,'');const d=t.indexOf('.');if(d>=0)t=t.substring(0,d+4);return t;}
function shortUrl(u){try{return new URL(u).hostname;}catch{return u;}}
function esc(s){if(s==null)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// --- Process resource stats ---
// Fetched from /api/stats on its own cadence and patched into the per-node
// Resources cells, so live numbers never disturb the main render fingerprint.
function fmtBytes(b){
  if(b==null)return'–';
  const K=1024;
  if(b<K)return b+' B';
  if(b<K*K)return (b/K).toFixed(0)+' KB';
  if(b<K*K*K)return (b/(K*K)).toFixed(0)+' MB';
  return (b/(K*K*K)).toFixed(1)+' GB';
}
function sparkSvg(vals){
  if(!Array.isArray(vals)||vals.length<2)return'';
  const w=64,h=16,n=vals.length;let mn=Math.min(...vals),mx=Math.max(...vals);
  if(mx<=mn)mx=mn+1; // flat series → flat line along the baseline
  const pts=vals.map((v,i)=>((i/(n-1))*w).toFixed(1)+','+(h-((v-mn)/(mx-mn))*(h-2)-1).toFixed(1)).join(' ');
  return '<svg class="stat-spark" viewBox="0 0 '+w+' '+h+'" width="'+w+'" height="'+h+'" preserveAspectRatio="none" aria-hidden="true"><polyline points="'+pts+'"/></svg>';
}
function statCell(ns){
  if(!ns)return'<span class="stat-none">–</span>';
  return '<span class="stat-mem" title="Resident memory (whole process tree)">'+esc(fmtBytes(ns.mem))+'</span>'+
         '<span class="stat-cpu" title="CPU, % of one core (whole process tree)">'+Math.round(ns.cpu||0)+'%</span>'+
         sparkSvg(ns.spark);
}
async function refreshStats(){
  try{
    const r=await fetch('/api/stats');if(!r.ok)return;
    // Keyed by project root then run name — run names collide across projects,
    // so match a card on both its path and run, mirroring the response.
    const projects=(await r.json()).projects||{};
    for(const card of $$('.card')){
      const byNode=(projects[card.dataset.path]||{})[card.dataset.run]||{};
      for(const cell of $$('[data-statkey]',card))cell.innerHTML=statCell(byNode[cell.dataset.statkey]);
    }
  }catch(e){}
}

// One badge per live tunnel: direct (green, full bandwidth) or relayed
// (yellow — throughput is capped by the relay, the usual cause of slow
// shares). `connections` is absent from pre-transport-reporting daemons.
function connSpans(share){
  let h='';
  for(const c of (share.connections||[])){
    const who=c.label||String(c.node_id||'').slice(0,10);
    const rtt=(c.rtt_ms!=null)?(', rtt '+c.rtt_ms+'ms'):'';
    if(c.transport==='direct'){
      h+='<span class="share-conn" title="'+esc(who+': direct ('+(c.via||'')+rtt+')')+'"><span class="conn-dot"></span>'+esc(who)+': direct'+esc(rtt)+'</span>';
    }else if(c.transport==='relayed'){
      h+='<span class="share-conn relayed" title="Throughput is limited by the relay"><span class="conn-dot"></span>'+esc(who)+': relayed via '+esc(c.via||'unknown relay')+esc(rtt)+'</span>';
    }else{
      h+='<span class="share-conn"><span class="conn-dot" style="background:var(--dim)"></span>'+esc(who)+': no open path</span>';
    }
  }
  return h;
}

const linkUrls=us=>(us||[]).map(u=>'<a class="surl" href="'+esc(u)+'" target="_blank" rel="noopener">'+esc(u)+'</a>').join('');
function setJoinState(kind,data){
  const ov=document.getElementById('join-overlay'),body=document.getElementById('join-body');
  ov.hidden=false;
  if(kind==='waiting'){
    body.innerHTML='<div class="spinner" style="margin:0 auto 18px"></div><h2>Joining…</h2><p>'+esc(data)+'</p>';
  }else if(kind==='ok'){
    const warn=(data.warnings&&data.warnings.length)?'<p>'+data.warnings.map(esc).join('<br>')+'</p>':'';
    body.innerHTML='<div class="big">✅</div><h2>Approved — you’re in</h2><p>These URLs now open on this machine:</p><div class="urls">'+linkUrls(data.urls)+'</div>'+warn+'<a class="sbtn" href="/">Open dashboard</a> <button class="sbtn deny" data-join-leave="'+esc(data.join_id)+'">Leave</button>';
  }else if(kind==='ended'){
    body.innerHTML='<div class="big">🔌</div><h2>Share ended</h2><p>The host stopped sharing — these URLs are no longer reachable.</p><a class="sbtn" href="/">Go to dashboard</a>';
  }else if(kind==='needsToken'){
    const retryNote=data.retry?'<p style="color:var(--yellow)">That token was rejected. Try again.</p>':'';
    body.innerHTML='<div class="big">🔑</div><h2>Relay needs a token</h2>'+
      '<p>The relay <code>'+esc(data.relayUrl)+'</code> is private. Enter its authorization token to join.</p>'+retryNote+
      '<div style="margin:16px 0;text-align:left">'+
      '<input id="relay-token-input" type="password" placeholder="Relay auth token" autocomplete="off" spellcheck="false" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--mono)">'+
      '<label style="display:flex;gap:8px;align-items:center;margin-top:10px;color:var(--text2);font-size:13px"><input id="relay-token-remember" type="checkbox" checked> Remember this token for this relay on this machine</label>'+
      '</div>'+
      '<button class="sbtn" id="relay-token-submit" data-relay-url="'+esc(data.relayUrl)+'">Join</button>';
    const inp=document.getElementById('relay-token-input');
    if(inp){inp.focus();inp.addEventListener('keydown',ev=>{if(ev.key==='Enter')document.getElementById('relay-token-submit').click();});}
  }else{
    body.innerHTML='<div class="big">⛔</div><h2>Join failed</h2><p>'+esc(typeof data==='string'?data:JSON.stringify(data))+'</p><a class="sbtn" href="/">Go to dashboard</a>';
  }
}
let joinWatch=null;
// Poll whether this join still exists locally; the daemon removes it when the
// host stops sharing (or goes away), so this flips the modal to "share ended".
function watchJoin(joinId){
  if(joinWatch)clearInterval(joinWatch);
  joinWatch=setInterval(async()=>{
    try{
      const r=await fetch('/api/shares');if(!r.ok)return;
      const d=await r.json();
      if(!(d.joins||[]).some(j=>j.id===joinId)){
        clearInterval(joinWatch);joinWatch=null;
        setJoinState('ended');
      }
    }catch(e){}
  },3000);
}
async function runJoinFlow(relayTokens,remember){
  const ticket=decodeURIComponent((location.hash||'').replace(/^#/,'')).trim();
  if(!ticket){setJoinState('error','This join link has no ticket. Ask the host to resend it.');return;}
  const supplying=relayTokens&&Object.keys(relayTokens).length>0;
  setJoinState('waiting','Connecting to the host and waiting for approval…');
  try{
    const payload={ticket};
    if(supplying){payload.relay_tokens=relayTokens;payload.remember=!!remember;}
    const resp=await fetch('/api/shares/join',{method:'POST',headers:{'Content-Type':'application/json','X-Veld-Request':'1'},body:JSON.stringify(payload)});
    if(!resp.ok){setJoinState('error',(await resp.text())||('HTTP '+resp.status));return;}
    const d=await resp.json();
    // Relay is token-gated and the daemon has no valid token yet → prompt.
    if(d.needs_relay_token){setJoinState('needsToken',{relayUrl:d.needs_relay_token,retry:supplying});return;}
    setJoinState('ok',d);
    watchJoin(d.join_id);
  }catch(e){setJoinState('error',String(e));}
}
// Accumulates supplied relay tokens across prompts, so a ticket advertising
// more than one token-gated relay (each surfaced one at a time) collects every
// token instead of the latest submit replacing the previous relay's.
let joinRelayTokens={};
document.addEventListener('click',e=>{
  const b=e.target.closest('#relay-token-submit');if(!b)return;
  const inp=document.getElementById('relay-token-input');
  const token=((inp&&inp.value)||'').trim();
  if(!token){if(inp)inp.focus();return;}
  const remember=!!((document.getElementById('relay-token-remember')||{}).checked);
  joinRelayTokens[b.dataset.relayUrl]=token;
  runJoinFlow(joinRelayTokens,remember);
});
document.addEventListener('click',async e=>{
  const b=e.target.closest('[data-join-leave]');if(!b)return;
  b.disabled=true;
  try{await fetch('/api/shares/joins/'+encodeURIComponent(b.dataset.joinLeave),{method:'DELETE',headers:{'X-Veld-Request':'1'}});}catch(e){}
  location.href='/';
});
async function refreshShares(){
  try{
    const resp=await fetch('/api/shares');if(!resp.ok)return;
    const d=await resp.json();
    const panel=document.getElementById('shares-panel');
    const has=(d.pending&&d.pending.length)||(d.joins&&d.joins.length);
    if(!has){panel.hidden=true;panel.innerHTML='';return;}
    let html='';
    if(d.pending&&d.pending.length){
      html+='<h3>Join requests</h3>';
      for(const p of d.pending){
        html+='<div class="share-row pending"><div class="grow"><span class="label">'+esc(p.label||'(no label)')
          +'</span> wants to join <span class="sid">'+esc(p.share_id)+'</span><div class="nid">'+esc(p.node_id)+'</div></div>'
          +'<button class="sbtn approve" data-sact="approve" data-sid="'+esc(p.id)+'">Approve</button>'
          +'<button class="sbtn deny" data-sact="deny" data-sid="'+esc(p.id)+'">Deny</button></div>';
      }
    }
    if(d.joins&&d.joins.length){
      html+='<h3>Joined</h3>';
      for(const j of d.joins){
        html+='<div class="share-row"><div class="grow"><div class="urls">'+linkUrls(j.urls)
          +'</div><span class="sid">'+esc(j.id)+'</span></div>'
          +'<button class="sbtn" data-sact="leave" data-sid="'+esc(j.id)+'">Leave</button></div>';
      }
    }
    panel.innerHTML=html;panel.hidden=false;
  }catch(e){}
}
document.addEventListener('click',async e=>{
  const b=e.target.closest('[data-sact]');if(!b)return;
  const act=b.dataset.sact,id=b.dataset.sid,H={'X-Veld-Request':'1'};
  b.disabled=true;
  try{
    if(act==='approve')await fetch('/api/shares/requests/'+encodeURIComponent(id)+'/approve',{method:'POST',headers:H});
    else if(act==='deny')await fetch('/api/shares/requests/'+encodeURIComponent(id)+'/deny',{method:'POST',headers:H});
    else if(act==='unshare')await fetch('/api/shares/'+encodeURIComponent(id),{method:'DELETE',headers:H});
    else if(act==='leave')await fetch('/api/shares/joins/'+encodeURIComponent(id),{method:'DELETE',headers:H});
  }catch(e){}
  refreshShares();
});
function flashBtn(b,txt){const o=b.textContent;b.textContent=txt;b.classList.add('ok');setTimeout(()=>{b.textContent=o;b.classList.remove('ok');},1400);}
document.addEventListener('click',async e=>{
  const b=e.target.closest('[data-action]');if(!b)return;
  const act=b.dataset.action,H={'X-Veld-Request':'1'};
  if(act==='copy-join'){navigator.clipboard.writeText(b.dataset.joinurl);flashBtn(b,'Copied');return;}
  if(act==='copy-join-cmd'){navigator.clipboard.writeText('veld join '+b.dataset.ticket);flashBtn(b,'Copied');return;}
  if(act==='start-share'){
    b.disabled=true;const run=b.dataset.run;let copied=false;
    try{
      const r=await fetch('/api/shares',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({run,approve:'manual'})});
      if(r.ok){const d=await r.json();if(d.join_url){try{await navigator.clipboard.writeText(d.join_url);copied=true;}catch(e){}}}
    }catch(e){}
    await refresh();refreshShares();
    if(copied){document.querySelectorAll('.card').forEach(c=>{if(c.dataset.run===run){const cb=c.querySelector('[data-action="copy-join"]');if(cb)flashBtn(cb,'Link copied!');}});}
    return;
  }
  if(act==='start-web-share'){
    b.disabled=true;const run=b.dataset.run;
    try{
      const r=await fetch('/api/shares',{method:'POST',headers:{...H,'Content-Type':'application/json'},body:JSON.stringify({run,web:true})});
      if(!r.ok){
        // The daemon's error names the fix (no gateway configured, no
        // web-opted nodes, …) — show it rather than failing silently.
        const detail=(await r.text()).trim();
        alert('Web sharing failed: '+(detail||r.status));
      }
    }catch(e){alert('Web sharing failed: could not reach the daemon');}
    b.disabled=false;
    await refresh();refreshShares();
    return;
  }
  if(act==='stop-share'){try{await fetch('/api/shares/'+encodeURIComponent(b.dataset.share),{method:'DELETE',headers:H});}catch(e){}refresh();refreshShares();return;}
});
document.addEventListener('change',async e=>{
  const t=e.target.closest('[data-action="toggle-auto"]');if(!t)return;
  try{await fetch('/api/shares/'+encodeURIComponent(t.dataset.share)+'/mode',{method:'POST',headers:{'X-Veld-Request':'1','Content-Type':'application/json'},body:JSON.stringify({approve:t.checked?'auto':'manual'})});}catch(e){}
  refresh();
});
refresh();setInterval(refresh,3000);
refreshShares();setInterval(refreshShares,3000);
refreshStats();setInterval(refreshStats,5000);
if(location.pathname.replace(/\/+$/,'').endsWith('/join'))runJoinFlow();
})();
